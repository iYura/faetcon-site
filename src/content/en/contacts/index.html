<div class="heading-row"><h1>Contacts</h1></div>
<p>Questions about talks, sponsorship, booths, or volunteering — reach out.</p>

<form class="contact-form" action="#" method="post">
  <label>Name
    <input type="text" name="name" required>
  </label>
  <label>Email
    <input type="email" name="email" required>
  </label>
  <label>Topic
    <select name="topic">
      <option>Talk / CFP</option>
      <option>Sponsorship</option>
      <option>Vendor booth</option>
      <option>Volunteering</option>
      <option>Other</option>
    </select>
  </label>
  <label>Message
    <textarea name="message" rows="5" required></textarea>
  </label>
  <input class="hp-field" type="text" name="hp" tabindex="-1" autocomplete="off">
  <button class="btn" type="submit">Send</button>
</form>

<div class="organizer">
  <p><strong>Organizer</strong></p>
  <p>Faculty of Air Navigation, Electronics and Telecommunications (FAET)<br>Kyiv Aviation Institute (KAI), Kyiv</p>
</div>
