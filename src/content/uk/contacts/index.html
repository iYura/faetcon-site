<div class="heading-row"><h1>Контакти</h1></div>
<p>Питання про доповіді, спонсорство, стенди чи волонтерство — пишіть нам.</p>

<form class="contact-form" action="#" method="post">
  <label>Ім'я
    <input type="text" name="name" required>
  </label>
  <label>Email
    <input type="email" name="email" required>
  </label>
  <label>Тема
    <select name="topic">
      <option>Доповідь / CFP</option>
      <option>Спонсорство</option>
      <option>Стенд</option>
      <option>Волонтерство</option>
      <option>Інше</option>
    </select>
  </label>
  <label>Повідомлення
    <textarea name="message" rows="5" required></textarea>
  </label>
  <input class="hp-field" type="text" name="hp" tabindex="-1" autocomplete="off">
  <button class="btn" type="submit">Надіслати</button>
</form>

<div class="organizer">
  <p><strong>Організатор</strong></p>
  <p>Факультет аеронавігації, електроніки та телекомунікацій (ФАЕТ)<br>Національний авіаційний університет (НАУ), Київ</p>
</div>
